 --legacy-peer-deps
 --legacy-peer-deps
 --legacy-peer-deps
 --legacy-peer-deps
 --legacy-peer-deps
 --legacy-peer-deps

      - name: Lint Code
        run: npm run lint

      - name: Build Project
        run: npm run build

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: build-and-lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        # If using SonarCloud, use 'SonarSource/sonarcloud-github-action@master' instead
        # and replace SONAR_HOST_URL with SONAR_ORGANIZATION
